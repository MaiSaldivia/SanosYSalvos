server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: geolocalizacion
          uri: http://ms-geolocalizacion:8082
          predicates:
            - Path=/api/geo/**
        - id: gestion-mascotas
          uri: http://ms-gestion-mascotas:8081
          predicates:
            - Path=/api/mascotas/**
        - id: motor-coincidencias
          uri: http://ms-motor-coincidencias:8083
          predicates:
            - Path=/api/match/**
        - id: usuarios-entidades
          uri: http://ms-usuarios-entidades:8084
          predicates:
            - Path=/api/usuarios/**
